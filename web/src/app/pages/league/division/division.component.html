<div class="division-container" *ngIf="division" [style.--division-color]="division.color">
  <!-- Division Header -->
  <app-division-header 
    [division]="division" 
    [currentWeek]="currentWeek" 
    [totalWeeks]="totalWeeks">
  </app-division-header>

  <!-- Current Match Section -->
  <app-current-match [currentMatch]="currentMatch"></app-current-match>

  <!-- Standings Table -->
  <app-division-standings [teams]="teams"></app-division-standings>

  <!-- Match History Section -->
  <app-match-history [matches]="matches"></app-match-history>

  <!-- Division Info -->
  <app-division-info [division]="division"></app-division-info>
</div>

<div class="error-container" *ngIf="!division">
  <h2>Division Not Found</h2>
  <p>The requested division could not be found.</p>
  <a routerLink="/league" class="back-link">← Back to League</a>
</div>
