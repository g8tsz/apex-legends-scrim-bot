<div class="pagination modern" *ngIf="totalPages > 1">
  <button class="pagination-btn" (click)="prev()" [disabled]="page === 1">
    &#8592; Prev
  </button>
  <span class="pagination-info">Page {{ page }} of {{ totalPages }}</span>
  <button class="pagination-btn" (click)="next()" [disabled]="page === totalPages">
    Next &#8594;
  </button>
</div>
